<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta
      name="description"
      content="MyRadl checks whether your Munich bike-share trip fits the 30-minute free window and finds an open dock near your destination."
    />
    <meta name="theme-color" content="#f5f8f7" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#0b1120" media="(prefers-color-scheme: dark)" />
    <title>MyRadl · Free-ride planner for Munich</title>
    <script>
      (function () {
        try {
          var stored = localStorage.getItem('myradl-theme')
          var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches
          if (stored === 'dark' || (stored === null && prefersDark)) {
            document.documentElement.classList.add('dark')
          }
        } catch (e) {}
      })()
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
